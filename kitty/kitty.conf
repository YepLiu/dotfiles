# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# --- FONT — Hack Nerd Font (Best on macOS) ---
font_size                 15.0
font_family               Hack Nerd Font Mono
bold_font                 Hack Nerd Font Mono Bold
italic_font               Hack Nerd Font Mono Italic
bold_italic_font          Hack Nerd Font Mono Bold Italic
adjust_line_height        110%
disable_ligatures         always
text_composition_strategy 2

# window
hide_window_decorations        titlebar-only
window_padding_width           15
background_opacity             0.96
background_blur                64
remember_window_size           yes

# tab bar
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted

# general key mapping
macos_option_as_alt yes

# vim key mapping
map cmd+s        send_text all \e:w\r
map cmd+p        send_text all :Telescope\ find_files\r
map cmd+shift+f  send_text all :Telescope\ live_grep\r
map cmd+b        send_text all :Neotree\ toggle\r

# tmux key mapping
map cmd+1 combine : send_key ctrl+space : send_key 1
map cmd+2 combine : send_key ctrl+space : send_key 2
map cmd+3 combine : send_key ctrl+space : send_key 3
map cmd+4 combine : send_key ctrl+space : send_key 4
map cmd+5 combine : send_key ctrl+space : send_key 5
map cmd+6 combine : send_key ctrl+space : send_key 6
map cmd+7 combine : send_key ctrl+space : send_key 7
map cmd+8 combine : send_key ctrl+space : send_key 8
map cmd+9 combine : send_key ctrl+space : send_key 9

# cursor & misc
cursor_blink_interval 0
detect_urls no
mouse_hide_wait 0.5

# --- Pane / Split management (VIM style movement) ---
# 左右分屏（vertical split）
map ctrl+shift+enter launch --location=vsplit --cwd=current
# 上下分屏（horizontal split）
map ctrl+shift+]     launch --location=hsplit --cwd=current
# （可选）保留 macOS 默认：Cmd+Enter 也做左右分屏
map cmd+enter        launch --location=vsplit --cwd=current

# pane navigation (VIM style)
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# resize pane (Alt + Ctrl + Shift + H/J/K/L)
map ctrl+shift+alt+h resize_window narrower
map ctrl+shift+alt+l resize_window wider
map ctrl+shift+alt+k resize_window taller
map ctrl+shift+alt+j resize_window shorter

# close pane
map ctrl+shift+w     close_window
